<h1>Order Item</h1>

<form method="POST">
    {% csrf_token %}
    {% for item in items %}
        <input type="checkbox" name="order-item" value="{{item.pk}}">
        {{item.product.name}}
        {{item.product.price}}
        {{item.product.desc}}
        {{item.product.quantity}}
        {{item.quantity}}
    {% endfor %}

    <input type="submit" value="Buy" name="method">
    <input type="submit" value="Delete" name="method">
</form>
