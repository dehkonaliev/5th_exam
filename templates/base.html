<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}5th Exam Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .card { transition: transform .15s ease; border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .card:hover { transform: translateY(-4px); }
        .card-img-top { height: 200px; object-fit: cover; background: #e9ecef; }
        .price-tag { font-weight: 700; color: #198754; }
        footer { margin-top: 60px; padding: 20px 0; text-align: center; color: #6c757d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'category-list' %}">🛒 5th Exam Shop</a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer>&copy; 2026 5th Exam Shop</footer>
</body>
</html>
